name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap non-interactive
        run: npm install -g @bubblewrap/cli

      - name: Generate TWA project
        run: |
          bubblewrap init \
            --manifest https://leishangthemlanchenba43-spec.github.io/pawlog/manifest.json \
            --directory twa-project \
            --jdkPath $JAVA_HOME \
            --androidSdkPath $ANDROID_SDK_ROOT
        env:
          BUBBLEWRAP_ACCEPT_OPTIONAL_DEPS: true

      - name: Build APK
        run: |
          cd twa-project
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pawlog-apk
          path: twa-project/app/build/outputs/apk/release/*.apk
