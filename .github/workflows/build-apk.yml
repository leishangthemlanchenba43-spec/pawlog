name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node and Bubblewrap
        run: |
          node --version
          npm install -g @bubblewrap/cli@latest

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'EOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Distributions_jdk/17.0.11-9/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

      - name: Create project files
        run: |
          mkdir -p twa-build
          cd twa-build
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.pawlog.catcare",
            "host": "leishangthemlanchenba43-spec.github.io",
            "name": "PawLog",
            "launcherName": "PawLog",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0F6E56",
            "navigationColor": "#0F6E56",
            "navigationColorDark": "#0F6E56",
            "navigationDividerColor": "#0F6E56",
            "navigationDividerColorDark": "#0F6E56",
            "backgroundColor": "#F5F4F0",
            "enableNotifications": false,
            "startUrl": "/pawlog/",
            "iconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-512.png",
            "maskableIconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-512.png",
            "monochromeIconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-192.png",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/manifest.json",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/",
            "minSdkVersion": 19,
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "features": {}
          }
          EOF
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pawlog2024 -keypass pawlog2024 \
            -dname "CN=PawLog,OU=Dev,O=PawLog,L=City,S=State,C=US"
          echo "pawlog2024" | bubblewrap update --manifest ./twa-manifest.json
          printf 'pawlog2024\npawlog2024\n' | bubblewrap build --manifest ./twa-manifest.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PawLog-Android
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release-bundle.aab
          if-no-files-found: warn
          retention-days: 30
