name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          bubblewrap init --manifest https://leishangthemlanchenba43-spec.github.io/pawlog/manifest.json --directory twa-project
        env:
          BUBBLEWRAP_ACCEPT_OPTIONAL_DEPS: true

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pawlog-apk
          path: twa-project/*.apk
