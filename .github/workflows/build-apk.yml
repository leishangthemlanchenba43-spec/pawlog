name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap and generate project
        run: |
          npm install -g @bubblewrap/cli
          mkdir twa-build && cd twa-build
          cat > twa-manifest.json << 'TWAMF'
          {
            "packageId": "com.pawlog.catcare",
            "host": "leishangthemlanchenba43-spec.github.io",
            "name": "PawLog",
            "launcherName": "PawLog",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0F6E56",
            "navigationColor": "#0F6E56",
            "navigationColorDark": "#0F6E56",
            "navigationDividerColor": "#0F6E56",
            "navigationDividerColorDark": "#0F6E56",
            "backgroundColor": "#F5F4F0",
            "enableNotifications": false,
            "startUrl": "/pawlog/",
            "iconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-512.png",
            "maskableIconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-512.png",
            "monochromeIconUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/icon-192.png",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/manifest.json",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://leishangthemlanchenba43-spec.github.io/pawlog/",
            "minSdkVersion": 19,
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "features": {}
          }
          TWAMF
          bubblewrap update --manifest ./twa-manifest.json

      - name: Generate keystore
        run: |
          cd twa-build
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pawlog2024 -keypass pawlog2024 \
            -dname "CN=PawLog,OU=Dev,O=PawLog,L=City,S=State,C=US"

      - name: Build with Gradle directly
        run: |
          cd twa-build
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/android.keystore \
            -Pandroid.injected.signing.store.password=pawlog2024 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=pawlog2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PawLog-Android
          path: twa-build/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
